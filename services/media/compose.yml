# =====================================
# MEDIA SERVICES
# =====================================
# Photo management and media services

services:
  # =====================================
  # PHOTO MANAGEMENT - IMMICH SERVER
  # =====================================
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: immich-server
    command: ["start.sh", "immich"]
    volumes:
      - ./uploads:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=${IMMICH_DB_USERNAME:-postgres}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD:-postgres}
      - DB_DATABASE_NAME=${IMMICH_DB_NAME:-immich}
      - REDIS_HOSTNAME=immich-redis
      - JWT_SECRET=${IMMICH_JWT_SECRET:-your-secret-key}
      - TZ=Europe/Rome
    depends_on:
      - immich-redis
      - immich-postgres
    networks:
      - proxy
      - immich
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich.entrypoints=web"
      - "traefik.http.routers.immich.rule=Host(`immich.home`)"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"

  # =====================================
  # IMMICH MICROSERVICES
  # =====================================
  immich-microservices:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: immich-microservices
    command: ["start.sh", "microservices"]
    volumes:
      - ./uploads:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=${IMMICH_DB_USERNAME:-postgres}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD:-postgres}
      - DB_DATABASE_NAME=${IMMICH_DB_NAME:-immich}
      - REDIS_HOSTNAME=immich-redis
      - JWT_SECRET=${IMMICH_JWT_SECRET:-your-secret-key}
      - TZ=Europe/Rome
    depends_on:
      - immich-redis
      - immich-postgres
    networks:
      - immich
    restart: unless-stopped

  # =====================================
  # IMMICH MACHINE LEARNING
  # =====================================
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    container_name: immich-machine-learning
    volumes:
      - immich-model-cache:/cache
    environment:
      - TZ=Europe/Rome
    networks:
      - immich
    restart: unless-stopped

  # =====================================
  # IMMICH REDIS
  # =====================================
  immich-redis:
    image: redis:6.2-alpine
    container_name: immich-redis
    volumes:
      - immich-redis-data:/data
    networks:
      - immich
    restart: unless-stopped

  # =====================================
  # IMMICH POSTGRES DATABASE
  # =====================================
  immich-postgres:
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    container_name: immich-postgres
    environment:
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD:-postgres}
      - POSTGRES_USER=${IMMICH_DB_USERNAME:-postgres}
      - POSTGRES_DB=${IMMICH_DB_NAME:-immich}
    volumes:
      - immich-postgres-data:/var/lib/postgresql/data
    networks:
      - immich
    restart: unless-stopped
